services:
  - type: web
    name: openclaw
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: OPENCLAW_STATE_DIR
        value: /.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
      - key: NODE_OPTIONS
        value: "--max-old-space-size=450"
      - key: OPENCLAW_GATEWAY_BIND
        value: "lan"
